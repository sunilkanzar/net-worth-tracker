<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Worth Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #e9ecf1; color: #0f172a; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ── Theme tokens ─────────────────────────────────────── */
  .theme-light {
    --bg: #f5f6f7;
    --bg-elev: #ffffff;
    --bg-alt: #f8fafc;
    --border: #eef0f2;
    --border-strong: #e2e8f0;
    --text: #0f172a;
    --text-2: #475569;
    --text-3: #64748b;
    --text-4: #94a3b8;
    --divider: #f1f5f9;
    --chip: #f1f5f9;
    --hero-grad: linear-gradient(160deg, #15161a 0%, #0a0b0e 100%);
    --hero-text: #ffffff;
    --hero-text-muted: rgba(255,255,255,0.5);
    --hero-border: rgba(255,255,255,0.08);
    --hero-chip-bg: rgba(255,255,255,0.06);
    --status-bar-fg: #0f172a;
    --notch-bg: #0a0b0e;
    --device-bezel: #0a0b0e;
    --shadow: 0 6px 20px rgba(15,23,42,0.12), 0 1px 3px rgba(15,23,42,0.08);
    --positive: #16a34a;
    --negative: #dc2626;
  }
  .theme-dark {
    --bg: #0b0c0f;
    --bg-elev: #17181c;
    --bg-alt: #1c1d22;
    --border: #25272c;
    --border-strong: #2e3036;
    --text: #f3f4f6;
    --text-2: #c7cad0;
    --text-3: #9aa0a6;
    --text-4: #6b7280;
    --divider: #25272c;
    --chip: #1f2025;
    --hero-grad: linear-gradient(160deg, #1a1c20 0%, #0f1013 100%);
    --hero-text: #ffffff;
    --hero-text-muted: rgba(255,255,255,0.55);
    --hero-border: rgba(255,255,255,0.08);
    --hero-chip-bg: rgba(255,255,255,0.08);
    --status-bar-fg: #e5e7eb;
    --notch-bg: #000000;
    --device-bezel: #000000;
    --shadow: 0 6px 20px rgba(0,0,0,0.6), 0 1px 3px rgba(0,0,0,0.4);
    --positive: #4ade80;
    --negative: #f87171;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 16px; bottom: 16px; z-index: 9999;
    background: #fff; border-radius: 16px; padding: 14px 14px;
    width: 240px;
    box-shadow: 0 20px 40px rgba(15,23,42,0.2), 0 2px 6px rgba(15,23,42,0.1);
    border: 1px solid #e2e8f0;
    font-size: 13px;
  }
  .tweaks h3 { margin: 0 0 10px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #64748b; font-weight: 700; }
  .tweaks label { display: block; margin-bottom: 10px; font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .swatches { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .swatch { width: 22px; height: 22px; border-radius: 7px; border: 2px solid #fff; box-shadow: 0 0 0 1px #e2e8f0; cursor: pointer; padding: 0; }
  .swatch.active { box-shadow: 0 0 0 2px #0f172a; }
  .seg { display: flex; background: #f1f5f9; border-radius: 8px; padding: 3px; gap: 2px; }
  .seg button { flex: 1; padding: 6px 8px; border: none; background: transparent; border-radius: 6px; font-size: 12px; font-weight: 600; color: #64748b; cursor: pointer; }
  .seg button.on { background: #fff; color: #0f172a; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
</style>
</head>
<body>

<div id="root"></div>

<script>
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#6366f1",
  "startScreen": "home",
  "theme": "light"
}/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/screens.jsx"></script>
<script type="text/babel" src="components/trends.jsx"></script>
<script type="text/babel" src="components/asset-detail.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const V = (n) => `var(--${n})`;

function Phone({ children, theme }) {
  const fg = theme === 'dark' ? '#e5e7eb' : '#0f172a';
  return (
    <div className={'theme-' + theme} style={{
      width: 390, height: 800, borderRadius: 40, overflow: 'hidden',
      background: V('device-bezel'), padding: 8,
      boxShadow: '0 30px 80px rgba(15,23,42,0.35), 0 8px 24px rgba(15,23,42,0.2)',
      position: 'relative',
    }}>
      <div style={{
        width: '100%', height: '100%', borderRadius: 32, overflow: 'hidden',
        background: V('bg'), position: 'relative',
      }}>
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 34, zIndex: 20,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 22px', pointerEvents: 'none',
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: fg }}>9:30</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <svg width="16" height="10" viewBox="0 0 16 10"><g fill={fg}>
              <rect x="0" y="6" width="2" height="4" rx="0.5"/>
              <rect x="4" y="4" width="2" height="6" rx="0.5"/>
              <rect x="8" y="2" width="2" height="8" rx="0.5"/>
              <rect x="12" y="0" width="2" height="10" rx="0.5"/>
            </g></svg>
            <svg width="24" height="12" viewBox="0 0 24 12">
              <rect x="0.5" y="0.5" width="21" height="11" rx="3" fill="none" stroke={fg} strokeOpacity="0.45"/>
              <rect x="2" y="2" width="17" height="8" rx="1.5" fill={fg}/>
              <rect x="22" y="4" width="1.5" height="4" rx="0.5" fill={fg} opacity="0.45"/>
            </svg>
          </div>
        </div>
        <div style={{
          position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 26, background: V('notch-bg'), borderRadius: 20, zIndex: 21,
        }} />
        <div style={{ paddingTop: 34, height: '100%', boxSizing: 'border-box' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

const ACCENTS = [
  { name: 'Teal', c: '#0ea5b7' },
  { name: 'Emerald', c: '#10b981' },
  { name: 'Indigo', c: '#6366f1' },
  { name: 'Amber', c: '#f59e0b' },
  { name: 'Rose',  c: '#f43f5e' },
  { name: 'Slate', c: '#334155' },
];

function resolveTheme(pref) {
  if (pref === 'system') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  return pref;
}

function App() {
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [accent, setAccent] = useState(TWEAKS.accent);
  const [themePref, setThemePref] = useState(TWEAKS.theme || 'light');
  const theme = resolveTheme(themePref);
  const [screen, setScreen] = useState(localStorage.getItem('nwt.screen') || TWEAKS.startScreen);
  const [state, setAppState] = useState({
    monthIdx: MONTHLY.length - 1,
    privacy: false,
    numFull: true,
    themePref: TWEAKS.theme || 'light',
  });
  const [editAsset, setEditAsset] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [longPressAsset, setLongPressAsset] = useState(null);
  const [singleTrendAsset, setSingleTrendAsset] = useState(null);

  useEffect(() => { localStorage.setItem('nwt.screen', screen); }, [screen]);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const onOpen = (s) => {
    if (s === 'menu') setMenuOpen(true);
    else if (s === 'add-asset') setEditAsset({ __new: true });
    else setScreen(s);
  };

  const setThemeFromSettings = (pref) => {
    setThemePref(pref);
    setAppState(s => ({ ...s, themePref: pref }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: pref } }, '*');
  };

  const ctx = { accent, theme, themePref, setThemePref: setThemeFromSettings };

  let current;
  if (singleTrendAsset) {
    current = <SingleAssetTrendScreen asset={singleTrendAsset} onBack={() => setSingleTrendAsset(null)} {...ctx} />;
  } else if (screen === 'home')        current = <HomeScreen state={state} setState={setAppState} {...ctx} onOpen={onOpen} onEditAsset={setEditAsset} onLongPressAsset={setLongPressAsset} />;
  else if (screen === 'overview')   current = <MonthOverviewScreen onBack={() => setScreen('home')} {...ctx} />;
  else if (screen === 'graph')      current = <GraphScreen onBack={() => setScreen('home')} {...ctx} />;
  else if (screen === 'allocation') current = <AllocationScreen onBack={() => setScreen('home')} {...ctx} />;
  else if (screen === 'trends')     current = <AssetTrendsScreen onBack={() => setScreen('home')} {...ctx} />;
  else if (screen === 'note')       current = <NoteScreen onBack={() => setScreen('home')} {...ctx} />;
  else if (screen === 'settings')   current = <SettingsScreen onBack={() => setScreen('home')} {...ctx} state={state} setState={setAppState} />;

  return (
    <div data-screen-label={screen} style={{ display: 'flex', gap: 30, alignItems: 'center' }}>
      <Phone theme={theme}>
        {current}
        {menuOpen && <SideMenu
          onClose={() => setMenuOpen(false)}
          onNavigate={(s) => { setMenuOpen(false); setScreen(s); }}
          {...ctx}
        />}
        {editAsset && <EntrySheet
          asset={editAsset.__new ? null : editAsset}
          onClose={() => setEditAsset(null)}
          onSave={() => setEditAsset(null)}
          {...ctx}
        />}
        {longPressAsset && <AssetLongPressMenu
          asset={longPressAsset}
          accent={accent}
          onClose={() => setLongPressAsset(null)}
          onViewTrend={(a) => { setLongPressAsset(null); setSingleTrendAsset(a); }}
          onDelete={() => setLongPressAsset(null)}
        />}
      </Phone>

      {tweaksOpen && (
        <div className="tweaks">
          <h3>Tweaks</h3>
          <label>Accent</label>
          <div className="swatches">
            {ACCENTS.map(a => (
              <button key={a.c} className={'swatch ' + (a.c === accent ? 'active' : '')}
                      style={{ background: a.c }} onClick={() => {
                        setAccent(a.c);
                        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: a.c } }, '*');
                      }}
                      title={a.name}/>
            ))}
          </div>

          <label style={{ marginTop: 14 }}>Theme</label>
          <div className="seg">
            {['light','dark','system'].map(t => (
              <button key={t} className={themePref === t ? 'on' : ''} onClick={() => setThemeFromSettings(t)}>
                {t[0].toUpperCase() + t.slice(1)}
              </button>
            ))}
          </div>

          <label style={{ marginTop: 14 }}>Start screen</label>
          <select value={screen} onChange={e => setScreen(e.target.value)}
                  style={{ width: '100%', padding: '8px 10px', borderRadius: 8, border: '1px solid #e2e8f0', background: '#f8fafc', fontSize: 13 }}>
            <option value="home">Home</option>
            <option value="overview">Month overview</option>
            <option value="graph">Net worth graph</option>
            <option value="allocation">Allocation</option>
            <option value="trends">Asset trends</option>
            <option value="note">Monthly note</option>
            <option value="settings">Settings</option>
          </select>

          <label style={{ marginTop: 14 }}>Privacy mode</label>
          <button onClick={() => setAppState({ ...state, privacy: !state.privacy })}
                  style={{ padding: '7px 12px', fontSize: 12, borderRadius: 8, border: '1px solid #e2e8f0', background: state.privacy ? accent : '#f8fafc', color: state.privacy ? '#fff' : '#0f172a', cursor: 'pointer', fontWeight: 600 }}>
            {state.privacy ? 'ON — balances hidden' : 'OFF — balances shown'}
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
